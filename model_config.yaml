# LLM Model Configuration for Context Management
# Worker models: optimized for speed, smaller context window (250K tokens)
# Planner models: optimized for reasoning, larger context window (1M tokens)

worker:
  model_tier: "worker"
  model_name: "deepseek/deepseek-v4-flash"  # Default Flash model name
  max_tokens: 250000
  soft_threshold: 175000       # Trigger soft compression at 175K (70% of max) to leave room for current task
  hard_limit: 200000         # Trigger aggressive compression at 200K (80% of max)
  token_budget: 80000        # Target compressed output ~80K tokens (32% of max)
  preserve_turns: 40         # Recent turns to preserve in normal mode
  preserve_turns_aggressive: 10  # Recent turns to preserve in aggressive mode
  min_importance_threshold: 0.15    # Minimum importance score (normal mode)
  min_importance_threshold_aggressive: 0.7  # Minimum importance score (aggressive mode)
  preserve_turns_hard_limit: 25       # Recent turns to preserve in hard limit mode
  min_importance_threshold_hard_limit: 0.35  # Minimum importance score (hard limit mode)
  history_retrieval_limit: 8
  history_retrieval_min_importance: 0.5
  fallback_models:           # Fallback models for 429 rate limit (in priority order)
    - "stepfun/step-3.5-flash"
    - "xiaomi/mimo-v2-flash"
  cost_hard_limit: 1.00      # USD hard limit (combined planner+worker budget)

planner:
  model_tier: "planner"
  model_name: "deepseek/deepseek-v4-pro"    # Default Pro model name
  max_tokens: 1000000
  soft_threshold: 200000      # Trigger soft compression at 200K (20% of max)
  hard_limit: 300000         # Trigger aggressive compression at 300K (30% of max)
  token_budget: 80000        # Target compressed output ~80K tokens (8% of max)
  preserve_turns: 60         # Recent turns to preserve in normal mode
  preserve_turns_aggressive: 10  # Recent turns to preserve in aggressive mode
  min_importance_threshold: 0.1    # Minimum importance score (normal mode)
  min_importance_threshold_aggressive: 0.7  # Minimum importance score (aggressive mode)
  preserve_turns_hard_limit: 40       # Recent turns to preserve in hard limit mode
  min_importance_threshold_hard_limit: 0.25  # Minimum importance score (hard limit mode)
  history_retrieval_limit: 10
  history_retrieval_min_importance: 0.3
  fallback_models:           # Fallback models for 429 rate limit (in priority order)
    - "qwen/qwen3.6-plus"
    - "xiaomi/mimo-v2.5-pro"
  cost_hard_limit: 1.00      # USD hard limit (combined planner+worker budget, same as flash)